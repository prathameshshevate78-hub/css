<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Controller Methods</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="myCtrl">

    <h1>AngularJS Controller Methods Example</h1>

    

    <!-- Method 2 -->
    <h2>Method 2: Add Two Numbers</h2>
    Enter Number 1:
    <input type="number" ng-model="num1"><br><br>

    Enter Number 2:
    <input type="number" ng-model="num2"><br><br>

    <button ng-click="addNumbers()">Add</button>
    <p>Sum = {{ sum }}</p>

    <hr>

    

    <!-- AngularJS Script -->
    <script>
        var app = angular.module("myApp", []);

        app.controller("myCtrl", function ($scope) {

            
            // Method 2: Add two numbers
            $scope.addNumbers = function () {
                $scope.sum = ($scope.num1 || 0) + ($scope.num2 || 0);
            };

           

        });
    </script>

</body>
</html>
