<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>Date Formatter</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="myCtrl">

    <h2>Date Formatter</h2>

    <input type="text" ng-model="inputDate" placeholder="Enter date in any format">
    <br><br>

    <button ng-click="submitDate()">Submit</button>

    <!-- Display result after submit -->
    <div ng-if="submitted">
        <p><b>Formatted Date (MM-DD-YYYY):</b> {{ formattedDate }}</p>
    </div>

<script>
var app = angular.module("myApp", []);

app.controller("myCtrl", function($scope) {

    $scope.submitted = false;
    $scope.formattedDate = "";

    $scope.submitDate = function() {
        $scope.submitted = true;
        $scope.formattedDate = formatDate($scope.inputDate);
    };

    function formatDate(dateStr) {
        if (!dateStr) return "";

        // Replace / with - for consistency
        dateStr = dateStr.replace(/\//g, "-");

        var parts = dateStr.split("-");

        var day, month, year;

        // Identify year by length (4 digits)
        if (parts[0].length === 4) {
            year = parts[0];
            month = parts[1];
            day = parts[2];
        } else if (parts[2].length === 4) {
            year = parts[2];
            month = parts[1];
            day = parts[0];
        } else {
            return "Invalid date format";
        }

        // Pad day & month
        day = day.padStart(2, '0');
        month = month.padStart(2, '0');

        return day + "-" + month + "-" + year;
    }

});
</script>

</body>
</html>
