<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Controller Methods</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="myCtrl">

    <h1>AngularJS Controller Methods Example</h1>

    <!-- Method 1 -->
    <h2>Method 1: Display a Message</h2>
    <button ng-click="showMessage()">Click to Show Message</button>
    <p>{{ output }}</p>

    <hr>

   
    <!-- AngularJS Script -->
    <script>
        var app = angular.module("myApp", []);

        app.controller("myCtrl", function ($scope) {

            // Method 1: Show message
            $scope.showMessage = function () {
                $scope.output = "Hello, this is a message from Controller!";
            };

         ;

        });
    </script>

</body>
</html>
